openapi: 3.0.3
info:
  title: Blog API
  version: 1.0.0
components:
  schemas:
    Post:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: Hello world }
        body: { type: string, example: First post. }
        userId: { type: integer, example: 1 }
    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: Ada Lovelace }
        email: { type: string, format: email }
paths:
  /posts:
    get:
      operationId: listPosts
      responses:
        "200":
          description: All posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
    post:
      operationId: createPost
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{id}:
    get:
      operationId: getPost
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: A post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /users/{id}:
    get:
      operationId: getUser
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: A user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
