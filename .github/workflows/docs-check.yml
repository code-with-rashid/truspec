name: Check docs build

# Validate the docs site on pull requests so broken links or unescaped `{{ }}`
# fail the PR before merge. This only builds — deployment lives in docs.yml.
on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-check.yml"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

# Cancel an in-progress check when new commits are pushed to the same PR.
concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs (fails on dead links)
        run: pnpm docs:build
